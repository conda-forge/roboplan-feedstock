context:
  name: roboplan
  version: "0.5.1"
  pinocchio_min: "4.0.0"
  pinocchio_max: "5.0.0"

recipe:
  name: roboplan
  version: ${{ version }}

source:
  # TODO: Release version 0.6.0 and update the URL and SHA256.
  # url: https://github.com/open-planning/roboplan/archive/refs/tags/${{ version }}.tar.gz
  # sha256: ef78508d1713d9c7da9eb39403b85b9875887d87f51a2f438ed43e0d65ce9dd9
  git: https://github.com/open-planning/roboplan.git
  rev: ea131dd3ca33267d33d9d8db3ecf6ab35a77d2c7

build:
  number: 1

outputs:
  - package:
      name: libroboplan-example-models
      version: ${{ version }}
    build:
      script:
        file: build_cpp
        env:
          ROBOPLAN_PACKAGE: roboplan_example_models
    requirements:
      run_exports:
        - ${{ pin_subpackage("libroboplan-example-models", upper_bound="x.x.x") }}
      build:
        - ${{ stdlib('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
      host:
        - if: win
          then: dlfcn-win32
        - gtest
      ignore_run_exports:
        by_name:
          - gtest
        from_package:
          - gtest
    tests:
      - package_contents:
          lib:
            - roboplan_example_models

  - package:
      name: roboplan-example-models-python
      version: ${{ version }}
    build:
      script:
        file: build_python
        env:
          ROBOPLAN_PACKAGE: roboplan_example_models
    requirements:
      run_exports:
        - ${{ pin_subpackage("roboplan-example-models-python", upper_bound="x.x.x") }}
      build:
        - ${{ stdlib('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
        - python
        - nanobind
        - if: match(python, "<3.11")
          then: typing_extensions
      host:
        - if: win
          then: dlfcn-win32
        - gtest
        - python
        - nanobind
        - if: match(python, "<3.11")
          then: typing_extensions
      run:
        - python
        - numpy
        - pinocchio-python >=${{ pinocchio_min }},<${{ pinocchio_max }}
      ignore_run_exports:
        by_name:
          - gtest
        from_package:
          - gtest
    tests:
      - package_contents:
          lib:
            - roboplan_example_models
      - python:
          pip_check: false
          imports:
            - roboplan.example_models

  - package:
      name: libroboplan
      version: ${{ version }}
    build:
      script:
        file: build_cpp
        env:
          ROBOPLAN_PACKAGE: roboplan
    requirements:
      run_exports:
        - ${{ pin_subpackage("libroboplan", upper_bound="x.x.x") }}
      build:
        - ${{ stdlib('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
      host:
        - if: win
          then: dlfcn-win32
        - gtest
        - libcoal
        - libpinocchio >=${{ pinocchio_min }},<${{ pinocchio_max }}
        - tinyxml2
        - yaml-cpp
        - libroboplan-example-models ==${{ version }}
        - eigen-abi-devel
      ignore_run_exports:
        by_name:
          - gtest
        from_package:
          - gtest
    tests:
      - package_contents:
          lib:
            - roboplan

  - package:
      name: roboplan-python
      version: ${{ version }}
    build:
      script:
        file: build_python
        env:
          ROBOPLAN_PACKAGE: roboplan
    requirements:
      run_exports:
        - ${{ pin_subpackage("roboplan-python", upper_bound="x.x.x") }}
      build:
        - ${{ stdlib('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
        - python
        - nanobind
        - if: match(python, "<3.11")
          then: typing_extensions
      host:
        - if: win
          then: dlfcn-win32
        - gtest
        - python
        - nanobind
        - if: match(python, "<3.11")
          then: typing_extensions
        - libcoal
        - libpinocchio >=${{ pinocchio_min }},<${{ pinocchio_max }}
        - tinyxml2
        - yaml-cpp
        - roboplan-example-models-python ==${{ version }}
        - eigen-abi-devel
      run:
        - python
        - numpy
        - pinocchio-python >=${{ pinocchio_min }},<${{ pinocchio_max }}
        - roboplan-example-models-python ==${{ version }}
      ignore_run_exports:
        by_name:
          - gtest
        from_package:
          - gtest
    tests:
      - package_contents:
          lib:
            - roboplan
      - python:
          pip_check: false
          imports:
            - roboplan.core

  - package:
      name: libroboplan-oink
      version: ${{ version }}
    build:
