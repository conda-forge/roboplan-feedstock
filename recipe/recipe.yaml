        - gtest
        - python
        - nanobind
        - if: match(python, "<3.11")
          then: typing_extensions
        - roboplan-python ==${{ version }}
        - roboplan-example-models-python ==${{ version }}
        - proxsuite
        - eigen-abi-devel
      run:
        - python
        - roboplan-python ==${{ version }}
        - roboplan-example-models-python ==${{ version }}
      ignore_run_exports:
        by_name:
          - gtest
        from_package:
