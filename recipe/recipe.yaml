context:
  name: roboplan
  version: "0.5.0"

recipe:
  name: roboplan
  version: ${{ version }}

source:
  url: https://github.com/open-planning/roboplan/archive/refs/tags/${{ version }}.tar.gz
  sha256: 54052a1e637d8a63764cc0bf0a16f19bcbd2e8038f912c25a16c937ad80be9f3

build:
  number: 0

outputs:
  - package:
      name: libroboplan-example-models
      version: ${{ version }}
    build:
      skip:
        - win
      script: |
        cmake -S "${SRC_DIR}/roboplan_example_models" \
          -B build/roboplan_example_models \
          -G Ninja \
          ${CMAKE_ARGS} \
          -DBUILD_PYTHON_BINDINGS=OFF \
          -DCMAKE_CXX_FLAGS="${CMAKE_CXX_FLAGS} -D_LIBCPP_DISABLE_AVAILABILITY"
        cmake --build build/roboplan_example_models
        cmake --install build/roboplan_example_models
    requirements:
      run_exports:
        - ${{ pin_subpackage("libroboplan-example-models", upper_bound="x.x.x") }}
      build:
        - ${{ stdlib('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
      host:
        - gtest
      ignore_run_exports:
        by_name:
          - gtest
        from_package:
          - gtest
    tests:
      - package_contents:
          lib:
            - roboplan_example_models

  - package:
      name: roboplan-example-models-python
      version: ${{ version }}
    build:
      skip:
        - win
      script: |
        cmake -S "${SRC_DIR}/roboplan_example_models" \
          -B build/roboplan_example_models_python \
          -G Ninja \
          ${CMAKE_ARGS} \
          -DPython_EXECUTABLE=${PYTHON} \
          -DPython3_EXECUTABLE=${PYTHON} \
          -DBUILD_PYTHON_BINDINGS=ON \
          -DGENERATE_PYTHON_STUBS=ON \
          -DCMAKE_CXX_FLAGS="${CMAKE_CXX_FLAGS} -D_LIBCPP_DISABLE_AVAILABILITY"
        cmake --build build/roboplan_example_models_python
        cmake --install build/roboplan_example_models_python
    requirements:
      run_exports:
        - ${{ pin_subpackage("roboplan-example-models-python", upper_bound="x.x.x") }}
      build:
        - ${{ stdlib('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
        - python
        - nanobind
        - if: match(python, "<3.11")
          then: typing_extensions
      host:
        - gtest
        - python
        - nanobind
        - if: match(python, "<3.11")
          then: typing_extensions
      run:
        - python
        - numpy
        - pinocchio-python ==4.0.0
      ignore_run_exports:
        by_name:
          - gtest
        from_package:
          - gtest
    tests:
      - package_contents:
          lib:
            - roboplan_example_models
      - python:
          imports:
            - roboplan.example_models

  - package:
      name: libroboplan
      version: ${{ version }}
    build:
      skip:
        - win
      script: |
        cmake -S "${SRC_DIR}/roboplan" \
          -B build/roboplan \
          -G Ninja \
          ${CMAKE_ARGS} \
          -DBUILD_PYTHON_BINDINGS=OFF \
          -DCMAKE_CXX_FLAGS="${CMAKE_CXX_FLAGS} -D_LIBCPP_DISABLE_AVAILABILITY"
        cmake --build build/roboplan
        cmake --install build/roboplan
    requirements:
      run_exports:
        - ${{ pin_subpackage("libroboplan", upper_bound="x.x.x") }}
      build:
        - ${{ stdlib('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
      host:
        - gtest
        - libcoal
        - libpinocchio ==4.0.0
        - tinyxml2
        - yaml-cpp
        - libroboplan-example-models ==${{ version }}
        - eigen-abi-devel
      ignore_run_exports:
        by_name:
          - gtest
        from_package:
          - gtest
    tests:
      - package_contents:
          lib:
            - roboplan

