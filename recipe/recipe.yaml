        - gtest
        - libroboplan ==${{ version }}
        - libroboplan-example-models ==${{ version }}
        - eigen-abi-devel
      ignore_run_exports:
        by_name:
          - gtest
        from_package:
          - gtest
    tests:
      - package_contents:
          lib:
            - roboplan_simple_ik

  - package:
      name: roboplan-simple-ik-python
      version: ${{ version }}
    build:
      script:
        file: build_python
        env:
          ROBOPLAN_PACKAGE: roboplan_simple_ik
    requirements:
