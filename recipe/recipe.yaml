context:
  name: roboplan
  version: "0.4.0"

recipe:
  name: roboplan
  version: ${{ version }}

source:
  # url: https://github.com/open-planning/roboplan/archive/refs/tags/${{ version }}.tar.gz
  # sha256: 957f7bff8b81f9fedb851cc5b4528dd4b8291a538345906ec9ceb0944a1c3ca1
  git: https://github.com/open-planning/roboplan.git
  rev: a652f759101f6e6288e1b343d9f7645417f260f5

build:
  number: 0

outputs:
  - package:
      name: libroboplan-example-models
      version: ${{ version }}
    build:
      skip:
        - win
      script: |
        cmake -S "${SRC_DIR}/roboplan_example_models" \
          -B build/roboplan_example_models \
          -G Ninja \
          ${CMAKE_ARGS} \
          -DBUILD_PYTHON_BINDINGS=OFF \
          -DCMAKE_CXX_FLAGS="${CMAKE_CXX_FLAGS} -D_LIBCPP_DISABLE_AVAILABILITY"
        cmake --build build/roboplan_example_models
        cmake --install build/roboplan_example_models
    requirements:
      run_exports:
        - ${{ pin_subpackage("libroboplan-example-models", upper_bound="x.x.x") }}
      build:
        - ${{ stdlib('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
      host:
        - gtest
      ignore_run_exports:
        by_name:
          - gtest
        from_package:
          - gtest
    tests:
      - package_contents:
          lib:
            - roboplan_example_models

  - package:
      name: roboplan-example-models-python
      version: ${{ version }}
    build:
      skip:
        - win
      script: |
        cmake -S "${SRC_DIR}/roboplan_example_models" \
          -B build/roboplan_example_models_python \
          -G Ninja \
          ${CMAKE_ARGS} \
          -DPython_EXECUTABLE=${PYTHON} \
          -DPython3_EXECUTABLE=${PYTHON} \
          -DBUILD_PYTHON_BINDINGS=ON \
          -DGENERATE_PYTHON_STUBS=ON \
          -DCMAKE_CXX_FLAGS="${CMAKE_CXX_FLAGS} -D_LIBCPP_DISABLE_AVAILABILITY"
        cmake --build build/roboplan_example_models_python
        cmake --install build/roboplan_example_models_python
    requirements:
      run_exports:
        - ${{ pin_subpackage("roboplan-example-models-python", upper_bound="x.x.x") }}
      build:
        - ${{ stdlib('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
        - python
        - nanobind
        - if: build_platform != target_platform
          then: cross-python_${{ target_platform }}
      host:
        - gtest
        - python
        - nanobind
      run:
        - python
        - numpy
        - pinocchio-python ==4.0.0
      ignore_run_exports:
        by_name:
          - gtest
        from_package:
          - gtest
    tests:
      - package_contents:
          lib:
            - roboplan_example_models
      - python:
          imports:
            - roboplan.example_models

  - package:
      name: libroboplan
      version: ${{ version }}
    build:
      skip:
        - win
      script: |
        cmake -S "${SRC_DIR}/roboplan" \
          -B build/roboplan \
          -G Ninja \
          ${CMAKE_ARGS} \
          -DBUILD_PYTHON_BINDINGS=OFF \
          -DCMAKE_CXX_FLAGS="${CMAKE_CXX_FLAGS} -D_LIBCPP_DISABLE_AVAILABILITY"
        cmake --build build/roboplan
        cmake --install build/roboplan
    requirements:
      run_exports:
        - ${{ pin_subpackage("libroboplan", upper_bound="x.x.x") }}
      build:
        - ${{ stdlib('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
      host:
        - gtest
        - libcoal
        - libpinocchio ==4.0.0
        - yaml-cpp
        - libroboplan-example-models
        - eigen-abi-devel
      ignore_run_exports:
        by_name:
          - gtest
        from_package:
          - gtest
    tests:
      - package_contents:
          lib:
            - roboplan

  - package:
      name: roboplan-python
      version: ${{ version }}
